apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: planning-analytics-instance-gitops
  namespace: openshift-gitops
  labels:
    scope: namespace
    product: planning-analytics
spec:
  destination:
    name: ''
    namespace: default
    server: https://kubernetes.default.svc
  source:
    path: ''
    repoURL: https://raw.githubusercontent.com/IBM/charts/master/repo/ibm-helm
    targetRevision: ${planning-analytics-instance-version}
    chart: ${planning-analytics-instance-chart}
    helm:
      valuesObject:
        global:
          licenseAccept: true
          operatorNamespace: gitops-operator
          instanceNamespace: gitops-instance
          releaseVersion: 5.3.1
          tetheredNamespaces: []
          blockStorageClass: ocs-external-storagecluster-ceph-rbd
          fileStorageClass: ocs-external-storagecluster-cephfs
          imagePullPrefix: cp.icr.io
          imagePullSecret: ibm-entitlement-key
          installConfigImageDigest: sha256:4f6f08222f49b94ab2c5dc085dbf7ecc32ef77c01a7715568b50dfc1443cdadf
          installConfigImageName: cpopen/cpd/olm-utils-v4
          installConfigImagePullPrefix: cp.icr.io
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
