apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: non-olm-cp4d
  namespace: oc 
spec:
  project: default
  source:
    repoURL: https://github.com/gitops-cp4d/non-olm-cp4d-gitops-540.git
    targetRevision: main
    path: .
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true 
      selfHeal: true
    syncOptions:
      - CreateNamespace=true